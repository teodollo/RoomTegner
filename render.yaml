services:
  - type: web
    name: romskisse
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DB_PATH
        value: /opt/render/project/data/sketches.db
    disk:
      name: data
      mountPath: /opt/render/project/data
      sizeGB: 1
