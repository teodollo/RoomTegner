services:
  - type: web
    name: romskisse
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PORT
        value: 8000
      - key: DB_PATH
        value: /opt/render/project/data/sketches.db
    disk:
      name: data
      mountPath: /opt/render/project/data
      sizeGB: 1
